server:
  port: 8083
  forward-headers-strategy: framework

spring:
  application:
    name: transaction-service
  profiles:
    active: dev
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/transactiondb}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}

  instance:
    prefer-ip-address: true

    # com.tnf.orderservice: DEBUG
logging:
  level:
    org.springframework.cloud.sleuth: DEBUG



info:
  app:
    name: Order Service
    version: 1.0.0
    description: Manages orders

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

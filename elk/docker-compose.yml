name: banking-elk

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: banking-elasticsearch
    environment:
      - node.name=banking-es
      - discovery.type=single-node
      - xpack.security.enabled=false          # demo/local only — no auth
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
    networks: [elk]

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    container_name: banking-logstash
    environment:
      - "LS_JAVA_OPTS=-Xms256m -Xmx256m"
    volumes:
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
    ports:
      - "50000:50000"   # TCP input — services' LogstashTcpSocketAppender connects here
      - "9600:9600"     # Logstash monitoring API
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks: [elk]

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: banking-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks: [elk]

volumes:
  es-data:

networks:
  elk:
    driver: bridge

server:
  port: 8085

spring:
  application:
    name: notification-service

  profiles:
    active: dev

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/notificationdb}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

  instance:
    prefer-ip-address: true

management:
  tracing:
    enabled: true
    sampling:
      probability: 1.0
    propagation:
      type: b3
    export:
      zipkin:
        endpoint: http://localhost:9411/api/v2/spans

  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,beans,refresh,httpexchanges,prometheus

  endpoint:
    health:
      show-details: always

logging:
  level:
    "[com.banking.notification_service]": DEBUG
    "[io.micrometer.tracing]": DEBUG

info:
  app:
    name: Notification Service
    version: 1.0.0
    description: Central event / error log for the banking system (notifications + logs)

server:
  port: 9001
  forward-headers-strategy: framework

spring:
  application:
    name: ACCOUNT-SERVICE
  profiles:
    active: dev
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/accountdb}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true


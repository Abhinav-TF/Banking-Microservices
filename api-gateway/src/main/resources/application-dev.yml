server:
  port: 8080

spring:
  application:
    name: api-gateway

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# HS256 signing secret — MUST match auth-service's jwt.secret.
jwt:
  secret: ${JWT_SECRET:ThisIsAVeryStringSecretKeyThatCanNotBeGuessedAtAllTryToGuessItIfYouCan}

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web: DEBUG

management:
  tracing:
    enabled: true
    sampling:
      probability: 1.0 # Will trace all requests
    propagation: # In which format data is being sent 
      type: b3
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
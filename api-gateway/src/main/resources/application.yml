spring:
  application:
    name: API-GATEWAY

  profiles:
    active: dev

  config:
    import: optional:configserver:http://localhost:8889

  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true

          routes:

            # Auth Service (public: /auth/register, /auth/login)
            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/auth/**

            # Customer Service
            - id: customer-service
              uri: lb://CUSTOMER-SERVICE
              predicates:
                - Path=/customers/**

            # Account Service
            - id: account-service
              uri: lb://ACCOUNT-SERVICE
              predicates:
                - Path=/accounts/**

            # Transaction Service
            - id: transaction-service
              uri: lb://TRANSACTION-SERVICE
              predicates:
                - Path=/transactions/**

            # Wallet Service
            - id: wallet-service
              uri: lb://WALLET-SERVICE
              predicates:
                - Path=/wallets/**

            # Notification Service (notifications + logs)
            - id: notification-service
              uri: lb://NOTIFICATION-SERVICE
              predicates:
                - Path=/notifications/**,/logs/**

            ####################################################
            # Swagger/OpenAPI Routes
            ####################################################

            - id: auth-docs
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/auth-docs/v3/api-docs
              filters:
                - SetPath=/v3/api-docs

            - id: customer-docs
              uri: lb://CUSTOMER-SERVICE
              predicates:
                - Path=/customer/v3/api-docs
              filters:
                - SetPath=/v3/api-docs

            - id: account-docs
              uri: lb://ACCOUNT-SERVICE
              predicates:
                - Path=/account/v3/api-docs
              filters:
                - SetPath=/v3/api-docs

            - id: transaction-docs
              uri: lb://TRANSACTION-SERVICE
              predicates:
                - Path=/transaction/v3/api-docs
              filters:
                - SetPath=/v3/api-docs

            - id: wallet-docs
              uri: lb://WALLET-SERVICE
              predicates:
                - Path=/wallet/v3/api-docs
              filters:
                - SetPath=/v3/api-docs

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

  instance:
    prefer-ip-address: true

# HS256 signing secret — MUST match auth-service's jwt.secret. Override via env in real deployments.
jwt:
  secret: ${JWT_SECRET:ThisIsAVeryStringSecretKeyThatCanNotBeGuessedAtAllTryToGuessItIfYouCan}

management:
  tracing:
    enabled: true
    sampling:
      probability: 1.0
    propagation:
      type: b3

  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,beans,refresh,httpexchanges,gateway,prometheus

  endpoint:
    health:
      show-details: always

    gateway:
      access: unrestricted

logging:
  level:
    "[com.tnf.api_gateway]": DEBUG
    "[io.micrometer.tracing]": DEBUG

info:
  app:
    name: API Gateway
    version: 1.0.0
    description: Manages API Gateway

springdoc:
  swagger-ui:
    urls:
      - name: Auth Service
        url: /auth-docs/v3/api-docs

      - name: Customer Service
        url: /customer/v3/api-docs

      - name: Account Service
        url: /account/v3/api-docs

      - name: Transaction Service
        url: /transaction/v3/api-docs

      - name: Wallet Service
        url: /wallet/v3/api-docs
